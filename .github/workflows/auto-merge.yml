name: Auto-Merge Blade Super Agent PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ci-check:
    uses: ./.github/workflows/ci.yml

  auto-merge:
    runs-on: ubuntu-latest
    needs: [ci-check]
    if: github.event.pull_request.user.login == 'Blade Super Agent' && vars.AUTO_MERGE_ENABLED != 'false'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files against allowed paths
        id: check-paths
        env:
          ALLOWED_PATHS: ${{ vars.ALLOWED_PATHS || 'src/**,tests/**,docs/**' }}
        run: |
          # Get all changed files in the PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files found."
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # Convert comma-separated globs into an array
          IFS=',' read -ra PATTERNS <<< "$ALLOWED_PATHS"

          ALL_ALLOWED=true

          for FILE in $CHANGED_FILES; do
            FILE_ALLOWED=false
            for PATTERN in "${PATTERNS[@]}"; do
              PATTERN=$(echo "$PATTERN" | xargs)  # trim whitespace
              # Use bash extended globbing to match
              if [[ "$FILE" == $PATTERN ]]; then
                FILE_ALLOWED=true
                break
              fi
            done

            if [ "$FILE_ALLOWED" = false ]; then
              echo "BLOCKED: $FILE does not match any allowed path"
              ALL_ALLOWED=false
            fi
          done

          echo "allowed=$ALL_ALLOWED" >> "$GITHUB_OUTPUT"

      - name: Auto-approve and merge
        if: steps.check-paths.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto

      - name: Comment on disallowed files
        if: steps.check-paths.outputs.allowed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body \
            "⚠️ This PR modifies files outside allowed paths. Manual review required."
